<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZigZag - When everything feels too much...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #e0f7fa, #b2dfdb);
            color: #004d40;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }
        .header {
            text-align: center;
            padding: 50px 20px;
            background: #004d40;
            color: white;
        }
        .header h1 {
            font-size: 3em;
            margin: 0;
        }
        .header p {
            font-size: 1.5em;
            margin: 10px 0 0 0;
        }
        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .entry {
            border-bottom: 1px solid #b2dfdb;
            padding: 20px 0;
        }
        .entry h2 {
            color: #00796b;
            margin-top: 0;
        }
        .entry .timestamp {
            color: #004d40;
            font-size: 0.9em;
        }
        .entry .content {
            line-height: 1.6;
        }
        a {
            color: #00796b;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: #00796b;
            color: white;
            border-radius: 5px;
            text-decoration: none;
            margin: 10px 0;
        }
        .btn:hover {
            background: #004d40;
        }
        form {
            margin-top: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #b2dfdb;
            border-radius: 5px;
            box-sizing: border-box;
            margin-bottom: 15px;
        }
        button {
            background: #00796b;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #004d40;
        }
        .emoticon {
            font-size: 2em;
            margin: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>ZigZag</h1>
        <p>when everything feels too much… 😌</p>
    </div>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
